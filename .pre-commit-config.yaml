# Pre-commit hooks for SACP.
#
# Install once: uv tool install pre-commit && pre-commit install
# Run on demand: pre-commit run --all-files
#
# Hook order: secret detection first, then hygiene, then lint/format,
# then security analysis, then coding standards enforcement.

repos:
  # --- Secret detection (must run first) ---
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: gitleaks (block committed secrets)

  # --- Generic hygiene ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=512"]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending

  # --- Python lint + format ---
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: ["--fix", "--exit-non-zero-on-fix"]
      - id: ruff-format

  # --- Python security analysis (SAST) ---
  # Two passes (audit M-06): the strict src/ pass keeps the production
  # ban-list at full strength; the tests/ pass scans test code with B101
  # (assert_used) skipped — pytest tests legitimately use `assert`, but
  # everything else (subprocess shell=True, pickle, hardcoded passwords,
  # bind-all-interfaces) should still trip on test-only code.
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        name: bandit (Python SAST — src/)
        args: ["-c", "pyproject.toml"]
        additional_dependencies: ["bandit[toml]"]
      - id: bandit
        name: bandit (Python SAST — tests/, B101 skipped)
        files: ^tests/.*\.py$
        args: ["--skip", "B101", "--severity-level", "medium"]

  # --- Placeholder-secret guard (audit M-06) ---
  # Refuses commits that introduce a placeholder-secret literal into a
  # config-shaped file (.env, .yaml, .conf, .ini, etc.). The pattern list
  # lives in scripts/check_no_placeholder_secrets.py and is kept in
  # lockstep with src/config/validators.py _PLACEHOLDER_PATTERNS. Runtime
  # validators refuse to bind ports on these values, but a committed
  # config carrying one would still leak into the repo via review.
  # Python sources are excluded because the validator module
  # legitimately lists the patterns to detect them.
  - repo: local
    hooks:
      - id: no-placeholder-secrets
        name: no placeholder secrets in config files
        entry: uv run python scripts/check_no_placeholder_secrets.py
        language: system
        types_or: [yaml, toml, ini]
        files: \.(env|env\..*|conf|cfg)$|\.(ya?ml|toml|ini)$
        # .env.example: canonical placeholder home.
        # .2ms.yaml: secret-scanner allowlist that legitimately enumerates
        # the placeholder strings to suppress them in scanner output.
        exclude: ^(\.env\.example|\.2ms\.yaml)$
        pass_filenames: true

  # --- Coding standards enforcement (25-line/5-arg) ---
  - repo: local
    hooks:
      - id: standards-lint
        name: standards lint (25/5 enforcement)
        entry: uv run python scripts/lint_code_standards.py --baseline logs/standards-baseline/baseline.txt
        language: system
        types: [python]
        pass_filenames: true

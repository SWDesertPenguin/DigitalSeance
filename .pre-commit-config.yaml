# Pre-commit hooks for SACP.
#
# Install once: uv tool install pre-commit && pre-commit install
# Run on demand: pre-commit run --all-files
#
# Hook order: secret detection first, then hygiene, then lint/format,
# then security analysis, then coding standards enforcement.

repos:
  # --- Secret detection (must run first) ---
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: gitleaks (block committed secrets)

  # --- Generic hygiene ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=512"]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending

  # --- Python lint + format ---
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: ["--fix", "--exit-non-zero-on-fix"]
      - id: ruff-format

  # --- Python security analysis (SAST) ---
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        name: bandit (Python SAST)
        args: ["-c", "pyproject.toml"]
        additional_dependencies: ["bandit[toml]"]

  # --- Coding standards enforcement (25-line/5-arg) ---
  - repo: local
    hooks:
      - id: standards-lint
        name: standards lint (25/5 enforcement)
        entry: python scripts/lint_code_standards.py
        language: system
        types: [python]
        pass_filenames: true

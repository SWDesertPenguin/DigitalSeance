name: Bug report
description: Report a bug or unexpected behavior in SACP
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

        **For security vulnerabilities, do NOT use this form.** Use [GitHub Security Advisories](https://github.com/SWDesertPenguin/DigitalSeance/security/advisories/new) instead — anything around credential handling, authentication, encryption, prompt-injection, or participant isolation should be reported privately.

  - type: input
    id: version
    attributes:
      label: SACP version / commit
      description: The git SHA or pull date you're running.
      placeholder: "main@<sha> or 2026-04-30"
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment mode
      options:
        - Docker Compose (default)
        - Bare-metal `python -m src.run_apps`
        - Other (describe under repro steps)
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug. What did you expect to happen, and what happened instead?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps a maintainer can follow to see the bug.
      placeholder: |
        1. Start a session with two AI participants
        2. Trigger X
        3. Observe Y instead of Z
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: |
        Paste any relevant log lines or error output. The log scrubber should already redact API keys, bearer tokens, and obvious PII patterns, but **double-check** before pasting — anything you submit here is publicly visible.
      render: shell
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Anything else that might help — environment quirks, recent changes, related issues.
    validations:
      required: false

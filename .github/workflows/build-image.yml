name: Build and Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # GHCR requires the path component of an image reference to be
      # all-lowercase. ${{ github.repository }} preserves the original
      # repo case (e.g. SWDesertPenguin/DigitalSeance) — docker/metadata-
      # action handles this internally for `tags`, but the Trivy step
      # builds the reference manually from env.IMAGE_NAME, so we have
      # to lowercase explicitly here.
      - name: Compute lowercase image path
        id: lower
        shell: bash
        run: echo "image=${IMG,,}" >> "$GITHUB_OUTPUT"
        env:
          IMG: ${{ github.repository }}

      # Scan the just-pushed image for HIGH/CRITICAL CVEs in OS packages
      # and Python deps. Fails the workflow on any finding so a vulnerable
      # image can't sit on `:latest`. `vuln-type: os,library` covers both
      # the Debian base and the installed wheels.
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ steps.lower.outputs.image }}@${{ steps.build.outputs.digest }}
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          vuln-type: os,library
          ignore-unfixed: true

name: Build and Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # Actions pinned to immutable commit SHAs (vs mutable major-version
      # tags) per supply-chain hygiene — a compromised maintainer cannot
      # retag `v4` to a malicious ref. Dependabot proposes SHA bumps
      # against this format (.github/dependabot.yml).
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6.0.0
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest

      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        id: build
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # GHCR requires the path component of an image reference to be
      # all-lowercase. ${{ github.repository }} preserves the original
      # repo case (e.g. SWDesertPenguin/DigitalSeance) — docker/metadata-
      # action handles this internally for `tags`, but the Trivy step
      # builds the reference manually from env.IMAGE_NAME, so we have
      # to lowercase explicitly here.
      - name: Compute lowercase image path
        id: lower
        shell: bash
        run: echo "image=${IMG,,}" >> "$GITHUB_OUTPUT"
        env:
          IMG: ${{ github.repository }}

      # Scan the just-pushed image for HIGH/CRITICAL CVEs in OS packages
      # and Python deps. Fails the workflow on any finding so a vulnerable
      # image can't sit on `:latest`. `vuln-type: os,library` covers both
      # the Debian base and the installed wheels.
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ steps.lower.outputs.image }}@${{ steps.build.outputs.digest }}
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          vuln-type: os,library
          ignore-unfixed: true

      # Release-readiness gate (audit M-09): assert the image's /app tree
      # has every required entrypoint and none of the forbidden trees
      # (.env, .git, tests/, specs/, .venv, IDE caches). A drift in
      # .dockerignore or a bad COPY would otherwise ship workshop debris
      # to ghcr.io.
      - name: Set up Python for release-readiness check
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.14"
      - name: Release-readiness check
        run: |
          python scripts/check_image_contents.py \
            "${{ env.REGISTRY }}/${{ steps.lower.outputs.image }}@${{ steps.build.outputs.digest }}"

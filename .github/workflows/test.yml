name: Run Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    # Least-privilege GITHUB_TOKEN: this workflow only reads the repo and
    # publishes nothing. Belt-and-braces against the legacy repo-default
    # which can be read/write on older repositories.
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sacp_test
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: sacp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sacp_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      SACP_DATABASE_URL: postgresql://sacp_test:testpass@localhost:5432/sacp_test
      SACP_TEST_DATABASE_URL: postgresql://sacp_test:testpass@localhost:5432/sacp_test

    steps:
      # Actions pinned to immutable commit SHAs (vs mutable major-version
      # tags) per supply-chain hygiene — a compromised maintainer cannot
      # retag `v4` to a malicious ref. Dependabot proposes SHA bumps
      # against this format (.github/dependabot.yml).
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          # Match the Python minor the production image uses
          # (Dockerfile: python:3.14.4-slim-bookworm). Floor in
          # pyproject.toml stays at >=3.11 so contributors can install
          # on older interpreters; CI just tests against prod's Python.
          python-version: "3.14"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install .[dev] || pip install .
          pip install pytest pytest-asyncio

      - name: Generate test encryption key
        # Fresh per-run Fernet so no committable secret-shaped string lives
        # in the workflow file. Must run after Install dependencies because
        # cryptography is pulled in by the project install.
        run: |
          KEY=$(python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")
          echo "SACP_ENCRYPTION_KEY=$KEY" >> "$GITHUB_ENV"

      - name: Schema-mirror gate (alembic vs tests/conftest.py)
        run: python scripts/check_schema_mirror.py

      - name: Traceability gate (FR-to-test artifact)
        run: python scripts/check_traceability.py

      - name: Env-vars gate (SACP_* code/docs/validators coverage)
        run: python scripts/check_env_vars.py

      - name: Run unit tests (fast tier)
        run: pytest -v --tb=short -m "not integration"

      - name: Run integration tests (slow tier)
        run: |
          set +e
          pytest -v --tb=short -m integration
          rc=$?
          set -e
          if [ "$rc" = "5" ]; then
            echo "::notice::Integration tier collected zero tests (exit 5). No @pytest.mark.integration tests yet — expected during the pre-Phase-3 audit window. Spec 012 T048-T050 will land integration coverage."
            exit 0
          fi
          exit $rc

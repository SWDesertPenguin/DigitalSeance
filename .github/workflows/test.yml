name: Run Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    # Least-privilege GITHUB_TOKEN: this workflow only reads the repo and
    # publishes nothing. Belt-and-braces against the legacy repo-default
    # which can be read/write on older repositories.
    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sacp_test
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: sacp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sacp_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      SACP_DATABASE_URL: postgresql://sacp_test:testpass@localhost:5432/sacp_test
      SACP_TEST_DATABASE_URL: postgresql://sacp_test:testpass@localhost:5432/sacp_test
      # Spec 020 SC-001: byte-identical regression with the default LiteLLM
      # adapter. Setting the var explicitly documents the contract; the
      # default would also resolve to "litellm" if unset.
      SACP_PROVIDER_ADAPTER: litellm

    steps:
      # Actions pinned to immutable commit SHAs (vs mutable major-version
      # tags) per supply-chain hygiene — a compromised maintainer cannot
      # retag `v4` to a malicious ref. Dependabot proposes SHA bumps
      # against this format (.github/dependabot.yml).
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          # Match the Python minor the production image uses
          # (Dockerfile: python:3.14.4-slim-bookworm). Floor in
          # pyproject.toml stays at >=3.11 so contributors can install
          # on older interpreters; CI just tests against prod's Python.
          python-version: "3.14"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: scripts/package-lock.json

      - name: Install frontend-syntax-gate deps
        working-directory: scripts
        run: npm ci

      - name: Frontend JSX syntax gate
        # Catches the Babel-Standalone-only failure mode where app.jsx
        # ships raw to the browser. A syntax error otherwise hangs the
        # SPA at "Loading…" with no server-side log signal.
        run: node scripts/check_frontend_syntax.mjs

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install .[dev] || pip install .
          pip install pytest pytest-asyncio

      - name: Generate test encryption key
        # Fresh per-run Fernet so no committable secret-shaped string lives
        # in the workflow file. Must run after Install dependencies because
        # cryptography is pulled in by the project install.
        run: |
          KEY=$(python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")
          echo "SACP_ENCRYPTION_KEY=$KEY" >> "$GITHUB_ENV"

      - name: Schema-mirror gate (alembic vs tests/conftest.py)
        run: python scripts/check_schema_mirror.py

      - name: Traceability gate (FR-to-test artifact)
        run: python scripts/check_traceability.py

      - name: Env-vars gate (SACP_* code/docs/validators coverage)
        run: python scripts/check_env_vars.py

      - name: Doc-deliverables gate (canonical docs + HTTP/WS code coverage)
        run: python scripts/check_doc_deliverables.py

      - name: Audit-label parity gate (spec 029 FR-006)
        # Backend src/orchestrator/audit_labels.py vs frontend mirror
        # frontend/audit_labels.js. Drift on either side fails CI before
        # the panel renders [unregistered: ...] rows in production.
        run: python scripts/check_audit_label_parity.py

      - name: Time-formatter parity gate (spec 029 FR-009)
        # Byte-equal output of src/orchestrator/time_format.format_iso
        # and frontend/time_format.formatIso for fixed UTC instants.
        # Catches drift between Python isoformat truncation and the
        # JS formatter ahead of any timestamp display divergence.
        run: python scripts/check_time_format_parity.py

      - name: Detection-event taxonomy parity gate (spec 022 research.md §16)
        # Backend src/web_ui/detection_events.EVENT_CLASSES vs frontend
        # mirror frontend/detection_event_taxonomy.js. Drift on either
        # side fails CI before the panel renders [unregistered: ...]
        # rows in production.
        run: python scripts/check_detection_taxonomy_parity.py

      - name: Run unit tests (fast tier)
        run: pytest -v --tb=short -m "not integration"

      - name: Run integration tests (slow tier)
        run: |
          set +e
          pytest -v --tb=short -m integration
          rc=$?
          set -e
          if [ "$rc" = "5" ]; then
            echo "::notice::Integration tier collected zero tests (exit 5). No @pytest.mark.integration tests yet — expected during the pre-Phase-3 audit window. Spec 012 T048-T050 will land integration coverage."
            exit 0
          fi
          exit $rc

name: Clean up old container images

on:
  schedule:
    - cron: '0 6 * * 0'  # Weekly, Sunday 06:00 UTC
  workflow_dispatch:

permissions:
  packages: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      OWNER: ${{ github.repository_owner }}
      PACKAGE: digitalseance
      KEEP_COUNT: 5
      SEMVER_REGEX: '^v[0-9]+\.[0-9]+\.[0-9]+'
    steps:
      - name: List and prune package versions
        run: |
          set -euo pipefail

          # Fetch all versions for the user-owned container package.
          # GITHUB_TOKEN works because the repo is connected to the package.
          versions=$(gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "/users/${OWNER}/packages/container/${PACKAGE}/versions?per_page=100")

          # Iterate newest-first. Protect anything with a semver tag.
          # Keep the most recent KEEP_COUNT non-semver versions. Delete the rest.
          kept=0
          echo "$versions" | jq -c 'sort_by(.created_at) | reverse | .[]' \
          | while IFS= read -r v; do
            id=$(echo "$v" | jq -r '.id')
            tags=$(echo "$v" | jq -r '.metadata.container.tags // [] | join(",")')

            if echo "$tags" | grep -Eq "${SEMVER_REGEX}"; then
              echo "PROTECT id=${id} tags=[${tags}]"
              continue
            fi

            kept=$((kept + 1))
            if [ "${kept}" -le "${KEEP_COUNT}" ]; then
              echo "KEEP    id=${id} tags=[${tags}]"
              continue
            fi

            echo "DELETE  id=${id} tags=[${tags}]"
            gh api \
              --method DELETE \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/users/${OWNER}/packages/container/${PACKAGE}/versions/${id}"
          done

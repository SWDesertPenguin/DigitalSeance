log-level: info
stdout-format: yaml
ignore-on-exit: errors

# Suppress known-fake placeholder values used in .env.example, roles.sql,
# and design docs. Values match the _PLACEHOLDER_PATTERNS list in
# src/config/validators.py — startup will refuse-to-bind on these anyway.
# Do not blanket-ignore by rule ID; only specific fake values go here.
allowed-values:
  - "EXAMPLE_FERNET_KEY"
  - "REPLACE_ME"
  - "REPLACE_ME_BEFORE_FIRST_RUN"
  - "REPLACE_ME_BEFORE_FIRST_RUN_APP"
  - "REPLACE_ME_BEFORE_FIRST_RUN_CLEANUP"
  - "your-secret-here"
  - "changeme"
  - "generate-with-python-fernet"
  # Synthetic fixture in tests/test_mcp_app.py — test asserts this string is NOT
  # leaked in error responses, so the literal must remain in the source.
  - "sk-leaked-key-12345abcdef"
  # CI test fixture in .github/workflows/test.yml; used for CI test runs only,
  # never wraps real data. Pinned in the v0.1.0 git history which can't be
  # modified due to active copyright registration. Current test.yml generates
  # the key dynamically per-run; this allowlist entry is purely to keep
  # all-branches scans clean against the locked tag.
  - "nVEFAqlxNoXayhpZiK-KXwxeto-_y0HXdbtGSGBzSr8="
  # Spec 026 env-var NAME (not a secret value) — 2MS flagged the literal
  # string appearing in a tuple of var names in tests/test_026_validators.py
  # as a "generic-api-key". The string is documented in
  # specs/026-context-compression/contracts/env-vars.md and is the public
  # operator-facing name of the Phase 2 master switch.
  - "SACP_COMPRESSION_PHASE2_ENABLED"

git:
  all-branches: true

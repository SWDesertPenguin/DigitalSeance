services:
  postgres:
    # Pinned to a specific minor so a `docker compose pull` doesn't
    # silently swap the database engine under a running deployment.
    # Bump quarterly to pick up Postgres patch releases.
    image: postgres:16.6-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sacp}
      # `:?` form refuses to start if the env var is unset or empty.
      # Prevents the "I forgot to set POSTGRES_PASSWORD" path that would
      # otherwise silently boot Postgres on a default credential.
      # kics-scan ignore-line
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env or environment}
      POSTGRES_DB: ${POSTGRES_DB:-sacp}
      # Audit Critical-4: per-role bootstrap secrets consumed only by
      # scripts/db-init/00-create-sacp-roles.sh on first cluster init. The
      # `:?` form refuses to start the postgres container if any of the
      # four passwords are unset, so the role-creation step cannot silently
      # fall back to an empty / default credential.
      # kics-scan ignore-line
      SACP_ADMIN_PASSWORD: ${SACP_ADMIN_PASSWORD:?SACP_ADMIN_PASSWORD must be set in .env or environment}
      # kics-scan ignore-line
      SACP_APP_PASSWORD: ${SACP_APP_PASSWORD:?SACP_APP_PASSWORD must be set in .env or environment}
      # kics-scan ignore-line
      SACP_CLEANUP_PASSWORD: ${SACP_CLEANUP_PASSWORD:?SACP_CLEANUP_PASSWORD must be set in .env or environment}
      # kics-scan ignore-line
      SACP_AUDIT_READER_PASSWORD: ${SACP_AUDIT_READER_PASSWORD:?SACP_AUDIT_READER_PASSWORD must be set in .env or environment}
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Read-only mount: postgres image runs *.sh under this directory once
      # on first init. Re-running the script after the volume is created
      # requires `psql -f` against the live container (see runbook).
      - ./scripts/db-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sacp}"]
      interval: 5s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # Postgres image needs CHOWN (data dir init), SETUID/SETGID (drop to
    # postgres user), DAC_READ_SEARCH (read auth files). Add only those.
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_READ_SEARCH

  # Audit Critical-4: one-shot migration runner. Same image as `sacp` so
  # the alembic chain at HEAD ships in the same artifact, but invoked with
  # an explicit `alembic upgrade head` command + the elevated sacp_admin
  # DSN. The runtime `sacp` container waits on this service via
  # service_completed_successfully, then connects as sacp_app (the
  # restricted runtime role). Runs once per `docker compose up` cycle.
  sacp-migrate:
    image: ghcr.io/swdesertpenguin/digitalseance:latest
    command: ["alembic", "upgrade", "head"]
    env_file:
      - .env
    environment:
      # kics-scan ignore-line
      SACP_DATABASE_URL_MIGRATIONS: postgresql://sacp_admin:${SACP_ADMIN_PASSWORD:?SACP_ADMIN_PASSWORD must be set in .env or environment}@postgres:5432/${POSTGRES_DB:-sacp}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  sacp:
    image: ghcr.io/swdesertpenguin/digitalseance:latest
    ports:
      - "${SACP_MCP_PORT:-8750}:8750"
      - "${SACP_WEB_UI_PORT:-8751}:8751"
    # env_file passes every key in .env through to the container, so an
    # operator who adds e.g. SACP_ENABLE_DOCS=1 to .env doesn't also have
    # to thread it through the environment: block below. The explicit
    # entries that follow stay in place so compose still pre-flights the
    # required secrets via the `:?` form before any container starts.
    env_file:
      - .env
    environment:
      # Audit Critical-4: runtime DSN connects as the restricted sacp_app
      # role, NOT the bootstrap superuser. Per-table grants land via
      # alembic migration 026 (run separately by sacp-migrate above).
      # kics-scan ignore-line
      SACP_DATABASE_URL: postgresql://sacp_app:${SACP_APP_PASSWORD:?SACP_APP_PASSWORD must be set in .env or environment}@postgres:5432/${POSTGRES_DB:-sacp}
      # kics-scan ignore-line
      SACP_ENCRYPTION_KEY: ${SACP_ENCRYPTION_KEY:?SACP_ENCRYPTION_KEY must be set in .env or environment}
      SACP_AUTH_LOOKUP_KEY: ${SACP_AUTH_LOOKUP_KEY:?SACP_AUTH_LOOKUP_KEY must be set in .env or environment}
      SACP_WEB_UI_COOKIE_KEY: ${SACP_WEB_UI_COOKIE_KEY:?SACP_WEB_UI_COOKIE_KEY must be set in .env or environment}
      POOL_MIN_SIZE: ${POOL_MIN_SIZE:-2}
      POOL_MAX_SIZE: ${POOL_MAX_SIZE:-10}
      STATEMENT_TIMEOUT_MS: ${STATEMENT_TIMEOUT_MS:-30000}
      IDLE_TIMEOUT_MS: ${IDLE_TIMEOUT_MS:-60000}
      DISABLE_AIOHTTP_TRANSPORT: "True"
    depends_on:
      postgres:
        condition: service_healthy
      sacp-migrate:
        condition: service_completed_successfully
    # host-gateway makes ``host.docker.internal`` resolve to the Docker
    # bridge gateway from inside the sacp container. Required so operators
    # can point an Ollama participant at an Ollama daemon running on the
    # host (Add participant → provider=ollama → http://host.docker.internal:11434).
    # No-op on Docker Desktop (it injects the same mapping itself); fixes
    # Linux/WSL2-without-Desktop where the alias would otherwise NXDOMAIN.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Hits the web-UI /healthz endpoint (FastAPI, no DB touch). start_period
    # gives alembic upgrade head + app startup room before unhealthy strikes
    # count. Python stdlib probe avoids needing curl/wget in the slim image.
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8751/healthz', timeout=3).status == 200 else 1)"
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  pgdata:

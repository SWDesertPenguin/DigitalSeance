services:
  postgres:
    # Pinned to a specific minor so a `docker compose pull` doesn't
    # silently swap the database engine under a running deployment.
    # Bump quarterly to pick up Postgres patch releases.
    image: postgres:16.6-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sacp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-sacp}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sacp}"]
      interval: 5s
      timeout: 5s
      retries: 5

  sacp:
    image: ghcr.io/swdesertpenguin/digitalseance:latest
    ports:
      - "${SACP_MCP_PORT:-8750}:8750"
      - "${SACP_WEB_UI_PORT:-8751}:8751"
    environment:
      SACP_DATABASE_URL: postgresql://${POSTGRES_USER:-sacp}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-sacp}
      SACP_ENCRYPTION_KEY: ${SACP_ENCRYPTION_KEY}
      POOL_MIN_SIZE: ${POOL_MIN_SIZE:-2}
      POOL_MAX_SIZE: ${POOL_MAX_SIZE:-10}
      STATEMENT_TIMEOUT_MS: ${STATEMENT_TIMEOUT_MS:-30000}
      IDLE_TIMEOUT_MS: ${IDLE_TIMEOUT_MS:-60000}
      DISABLE_AIOHTTP_TRANSPORT: "True"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:

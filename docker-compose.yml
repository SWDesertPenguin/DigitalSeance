services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sacp}
      # `:?` form refuses to start if the env var is unset or empty.
      # Prevents the "I forgot to set POSTGRES_PASSWORD" path that would
      # otherwise silently boot Postgres on a default credential.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env or environment}
      POSTGRES_DB: ${POSTGRES_DB:-sacp}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sacp}"]
      interval: 5s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # Postgres image needs CHOWN (data dir init), SETUID/SETGID (drop to
    # postgres user), DAC_READ_SEARCH (read auth files). Add only those.
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_READ_SEARCH

  sacp:
    image: ghcr.io/swdesertpenguin/digitalseance:latest
    ports:
      - "${SACP_MCP_PORT:-8750}:8750"
      - "${SACP_WEB_UI_PORT:-8751}:8751"
    environment:
      SACP_DATABASE_URL: postgresql://${POSTGRES_USER:-sacp}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env or environment}@postgres:5432/${POSTGRES_DB:-sacp}
      SACP_ENCRYPTION_KEY: ${SACP_ENCRYPTION_KEY:?SACP_ENCRYPTION_KEY must be set in .env or environment}
      POOL_MIN_SIZE: ${POOL_MIN_SIZE:-2}
      POOL_MAX_SIZE: ${POOL_MAX_SIZE:-10}
      STATEMENT_TIMEOUT_MS: ${STATEMENT_TIMEOUT_MS:-30000}
      IDLE_TIMEOUT_MS: ${IDLE_TIMEOUT_MS:-60000}
      DISABLE_AIOHTTP_TRANSPORT: "True"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  pgdata:
